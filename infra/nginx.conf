events {
    worker_connections 1024;
}

http {

    # --- Upstreams (service discovery inside Docker) ---
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream jenkins {
        server jenkins:8080;
    }

    server {
        listen 80;

        # 1. Frontend (HUD)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Backend API (Brain)
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Jenkins (Sentinel)
        location /jenkins/ {
            proxy_pass http://jenkins/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # REQUIRED for Jenkins reverse proxy stability
            proxy_redirect http://jenkins:8080/ http://$host/jenkins/;
        }
    }
}